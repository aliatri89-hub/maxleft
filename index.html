<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Max Left</title>
    <meta name="description" content="The podcast app for the progressive left." />
    <meta property="og:title" content="Max Left" />
    <meta property="og:description" content="The podcast app for the progressive left." />
    <meta property="og:url" content="https://maxleft.app" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0B1F4A" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700;1,900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Max Left" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      body { margin: 0; background: #0f0d0b; }
      #splash-screen {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0f0d0b;
        transition: opacity 0.45s ease, transform 0.45s ease, visibility 0.45s ease;
      }
      #splash-screen.hidden { opacity: 0; transform: scale(1.02); visibility: hidden; pointer-events: none; }
      .splash-wordmark {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 800; font-size: 42px;
        color: #f5f0eb; letter-spacing: -0.02em;
        animation: splashUp 0.6s ease both;
      }
      .splash-wordmark span { color: #C4734F; }
      .splash-tagline {
        font-size: 13px; color: #8a7e72;
        margin-top: 12px; letter-spacing: 0.03em;
        animation: splashUp 0.8s ease 0.3s both;
      }
      @keyframes splashUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="splash-wordmark">Max <span>Left</span></div>
      <div class="splash-tagline">The podcast app for the left</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
